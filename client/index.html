<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <title>FayaFlex - Track, Compete, Win</title>
    <meta name="description" content="Join FayaFlex. Track calories, steps, and workouts with your team. Compete monthly and achieve your fitness goals together." />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="msapplication-TileColor" content="#0ea5e9" />
    
    <!-- iOS Specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FayaFlex" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration (web only, not native apps) -->
    <script>
      // Skip service worker for native Capacitor apps
      const isNativeApp = window.location.protocol === 'capacitor:' || 
                          window.location.href.includes('localhost') && window.Capacitor;
      
      if ('serviceWorker' in navigator && !isNativeApp) {
        window.addEventListener('load', () => {
          // Unregister old service workers first
          navigator.serviceWorker.getRegistrations().then(registrations => {
            registrations.forEach(reg => {
              if (reg.active && reg.active.scriptURL.includes('sw.js') && !reg.active.scriptURL.includes('sw-v6.js')) {
                reg.unregister();
              }
            });
          });
          // Register the new versioned service worker
          navigator.serviceWorker.register('/sw-v6.js')
            .then(registration => {
              console.log('Service Worker registered:', registration.scope);
              registration.update();
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
