name: Secret scan

# Server-side backstop for the local .githooks/pre-commit hook. A teammate on a
# fresh checkout (who hasn't run `git config core.hooksPath .githooks`), a
# commit made via the GitHub web UI, or any automation that bypasses local
# hooks will still be caught here before anything lands on `main`.
#
# The pattern list below is intentionally kept byte-for-byte in sync with the
# PATTERNS array in .githooks/pre-commit. If you add or change a rule in one
# place, mirror it in the other.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    name: Scan for leaked credentials
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Need full history on push so we can diff against the parent commit.
          # PRs already get a merge ref; depth 0 keeps both paths simple.
          fetch-depth: 0

      - name: Determine scan range
        id: range
        shell: bash
        run: |
          set -u
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            # On push, scan everything introduced by this push. For the very
            # first push to a branch (before == all-zeros) fall back to the
            # parent of HEAD so we still scan the new commit.
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ "$base" = "0000000000000000000000000000000000000000" ] || [ -z "$base" ]; then
              base="$(git rev-parse "${head}^" 2>/dev/null || echo "")"
            fi
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Run secret scan
        shell: bash
        env:
          BASE_SHA: ${{ steps.range.outputs.base }}
          HEAD_SHA: ${{ steps.range.outputs.head }}
        run: |
          set -u

          # Keep these two arrays in lockstep with .githooks/pre-commit.
          PATTERNS=(
            "Google OAuth access token (ya29.*)|ya29\.[A-Za-z0-9_-]{20,}"
            "Google API key (AIza...)|AIza[0-9A-Za-z_-]{35}"
            "OpenAI API key (sk-...)|sk-(proj-)?[A-Za-z0-9_-]{20,}"
            "GitHub token (ghp_/gho_/ghu_/ghs_/ghr_)|gh[pousr]_[A-Za-z0-9]{30,}"
            "Slack token (xox[baprs]-)|xox[baprs]-[A-Za-z0-9-]{10,}"
            "Stripe live secret key (sk_live_)|sk_live_[A-Za-z0-9]{20,}"
            "AWS access key id|AKIA[0-9A-Z]{16}"
            "PEM private key block|-----BEGIN ([A-Z]+ )?PRIVATE KEY-----"
            "Postgres URL with embedded password|postgres(ql)?:\/\/[^[:space:]:@\"']+:[^[:space:]:@\"']+@"
          )

          SKIP_REGEX='(^|/)(package-lock\.json|pnpm-lock\.yaml|yarn\.lock|\.githooks/pre-commit|\.github/workflows/secret-scan\.yml)$|\.(png|jpe?g|gif|webp|ico|pdf|zip|gz|tgz|mp4|mov|woff2?|ttf|otf)$'

          # Mirror of the allowlist in replit.md / .githooks/pre-commit:
          # Firebase iOS GoogleService-Info*.plist files ship AIza... client
          # API keys that are documented as safe-to-commit.
          ALLOWLIST_REGEX='GoogleService-Info.*\.plist$'

          if [ -n "${BASE_SHA:-}" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            mapfile -t FILES < <(git diff --name-only --diff-filter=ACMR "${BASE_SHA}" "${HEAD_SHA}")
            echo "Scanning ${#FILES[@]} changed file(s) between ${BASE_SHA} and ${HEAD_SHA}."
          else
            # Fallback: scan everything currently tracked. Used on the first
            # push to a new branch when no usable base commit exists.
            mapfile -t FILES < <(git ls-files)
            echo "No usable base commit; scanning all ${#FILES[@]} tracked file(s)."
          fi

          violations=0
          report=""

          for file in "${FILES[@]}"; do
            [ -f "$file" ] || continue
            if [[ "$file" =~ $SKIP_REGEX ]]; then
              continue
            fi

            content=$(git show "${HEAD_SHA}:$file" 2>/dev/null) || continue

            for entry in "${PATTERNS[@]}"; do
              label="${entry%%|*}"
              regex="${entry#*|}"

              matches=$(printf '%s\n' "$content" | grep -nE -e "$regex" || true)
              [ -z "$matches" ] && continue

              if [[ "$label" == "Google API key (AIza...)" && "$file" =~ $ALLOWLIST_REGEX ]]; then
                continue
              fi

              violations=$((violations + 1))
              report+=$'\n'"::error file=${file}::${label} detected in ${file}"$'\n'
              report+="✖ ${label} in ${file}"$'\n'
              while IFS= read -r line; do
                lineno="${line%%:*}"
                report+="    ${file}:${line}"$'\n'
                # Emit a per-line annotation so the failure links straight to
                # the offending line in the GitHub PR diff view.
                echo "::error file=${file},line=${lineno}::${label}"
              done <<< "$matches"
            done
          done

          if [ "$violations" -gt 0 ]; then
            printf '%s\n' "Secret scan blocked this build."
            printf '%s' "$report"
            printf '\n%s\n' "Remove the secret from the affected files (and any committed history) and rotate the underlying credential before retrying."
            printf '%s\n' "If this is a documented false positive, extend the allowlist in both .github/workflows/secret-scan.yml and .githooks/pre-commit, and note it under \"Security Notes\" in replit.md."
            exit 1
          fi

          echo "No leaked credentials detected."
